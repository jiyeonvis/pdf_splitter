name: Build PDF Splitter

on:
  workflow_dispatch:  # 수동으로 실행

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pdf_splitter_windows
            pyinstaller_args: --onefile --windowed --icon=icon.ico
          - os: macos-latest
            artifact_name: pdf_splitter_mac
            pyinstaller_args: --onedir --windowed --icon=icon.icns

    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install pymupdf pyinstaller

      - name: UPX 설치 (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install upx -y

      - name: UPX 설치 (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: 빌드
        run: pyinstaller ${{ matrix.pyinstaller_args }} -y --upx-dir . pdf_splitter.py

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
