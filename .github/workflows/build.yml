name: Build PDF Splitter

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pdf_splitter_windows
            pyinstaller_args: --onefile --windowed --icon=icon.ico
          - os: macos-latest
            artifact_name: pdf_splitter_mac
            pyinstaller_args: --onedir --windowed --icon=icon.icns

    runs-on: ${{ matrix.os }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install pymupdf pyqt6 pyinstaller

      - name: ffmpeg 설치 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          cp $(which ffmpeg) ./ffmpeg

      - name: ffmpeg 설치 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install ffmpeg -y
          copy "C:\ProgramData\chocolatey\bin\ffmpeg.exe" ffmpeg.exe

      - name: 빌드
        run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg:." pdf_splitter.py
        if: matrix.os == 'macos-latest'

      - name: 빌드 (Windows)
        run: pyinstaller ${{ matrix.pyinstaller_args }} -y --add-binary "ffmpeg.exe;." pdf_splitter.py
        if: matrix.os == 'windows-latest'

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
